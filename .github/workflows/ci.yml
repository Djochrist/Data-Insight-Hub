name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run check

      - name: Build (Vercel target)
        run: npm run build:vercel

      - name: Validate Python functions
        run: python3 -m py_compile api/_datasets_store.py api/_datasets_repo.py api/_rate_limit.py api/_db.py api/datasets/index.py api/datasets/'[id]'.py
